# Runs on every PR + every push to main.
# Fails fast on lint, test, and IaC validity. No AWS credentials needed.
name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  app:
    name: Go build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: app/go.sum

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -count=1 ./...

      - name: go build
        run: go build -o /tmp/server .

  terraform:
    name: Terraform fmt & validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/envs/dev
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: terraform fmt
        run: terraform fmt -check -recursive ../..

      - name: terraform init (no backend)
        # -backend=false skips the S3 backend; the placeholder bucket in versions.tf
        # is fine because validate doesn't talk to S3.
        run: terraform init -backend=false -input=false

      - name: terraform validate
        run: terraform validate

  image-scan:
    name: Build & Trivy scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
            --build-arg APP_VERSION=ci \
            --build-arg GIT_SHA=${GITHUB_SHA::7} \
            -t devops-challenge:ci .

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: devops-challenge:ci
          format: table
          # Fail the build on HIGH/CRITICAL findings with a known fix.
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
